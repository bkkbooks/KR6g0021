body:
  text: 北天竺三藏法師曇無讖奉詔譯晉沙門慧嚴慧觀同謝靈運重治隋灌頂法師疏高足湛然再治元傳天台教崇聖院沙門師正分科明會稽後學沙門湛然圓澄會疏註嘉善沈豫昌仁和張顯同校卍云此會疏解與大日本續藏經第五十六七套所收重訂交科本無大差仍單錄序䟦而已今北本已具有四品半謂是後分陳如末品具載須䟦然身報本之意有遺教品還源品茶毗品廓潤品與居士請僧經品目不同意實一貫也澄不揣己德妄意會入倘有悞脫之謬三寶慈悲懺悔將此微因上祝聖皇福壽萬延下禱黎民菩提共證生生藉此為法船不登覺岸誓不捨離世世持以為寶鑑未出魔罥願長相保現生父母與曠劫父母同悟一乘之佛性積生冤親及法界冤親共持六念以勳修五行堅持十德圓備眾生界盡方取菩提地獄未空誓不成佛比丘圓澄廣山真密明宗通達清朗會首沈豫昌葉明琪張顯成廣易沈大雲盧明淳朱廣蕃沈明潮俞明濡沈明瀚信女大霽杭州鄒門信女廣奇洎眾姓等發心刊此大涅槃經疏一部伏願在會眾等承此功德積生父母各途超昇歷劫冤親俱蒙解脫大涅槃日爍破昏衢秘密義天普含法界六念三修世世熏聞五行十德在在成就共證圓滿菩提各受最後付囑龍華三會初會相逢淨土九品上品授記者謹疏劉廣盤呂鳴治吳孝延嚴大參沈國彥沈憲朱常新胡奕訓沈兆槐曾慶芳沈受祉沈受祺壬寅中秋湛大師自會稽過訪見予案頭有南藏涅槃經疏問曰居士從何處得來予曰從殘書中檢出乃先世所遺師喟然嘆曰此疏昔灌頂老人當隋陳之亂拾糊窓紙錄疏艱辛萬狀上首湛然欲會經而不遂埋却藏中幾千年學者罕得寓目我將分疏會入經文有願而未逮如果居士為我流通予唯唯越十有三載乙卯孟冬師來我郡說法於福城東塔暇日相見於麟水之濵師曰涅槃疏會成矣出稿相示且云幾為病魔所沮向佛悲哀者累日願延殘喘以畢此願亡何病愈廣延書家焚膏繼又數月而始成居士不忘前諾乎予曰古德未了之案得師不惜身命以利樂有情敢食前諾遂於臘月八日紏工授梓幸賴同志樂助竣事於丁巳秋謹識其緣起歲月云爾丁巳孟冬朔日武塘沈豫昌識琪本名祺胤自幼知崇三寶丁巳春會湛大師講楞嚴經於福城東塔日往聽焉遂皈依大師得錫今法名先是涅槃會疏付刻流通功繁貲儉師甚憂之琪遂有幹蠱之思不覺悲淚是夕得一夢夢大師上堂前設一大浴槃大師體沾泥從槃沐浴而出頭長躍尺琪自視兩足沾泥次第亦入浴便覺覺而占之數然自喜曰夜來所夢分明其象為涅槃師弘大法固宜頭長數尺而琪亦濯足當是收功於後之兆是夕四月初四也遂發心代募得門下弟張顯慨助四十金而相繼助者有差兼程告竣于七月終旬計夢之夜迄工之竣僅一百二十日因紀其事如此以見法之流通非偶然也檀越姓名初議不必刻以善信發心龍天洞鑒但世間法恐有昧因果者故琪所募一一備書師講法華經於海鹽偷兒竊其侍者兩匣去中多募票因而失所或不得登名經尾惟護法韋䭾證之實無他也後零搜得姓名若干因附于左弟子明琪識涅槃經末後句一卷清淨挺著卍云收于閱經十二種第十二故省于此
