front:
  text: 南本大般涅槃經會疏敘夫大般涅槃經者乃如來顧命之言也蘊成矌劫而久祕不談方便調機而待時方説所以小大對帶半滿開宗頓漸偏圓初中後唱惟此奧旨最後極談其由庫內之珍財臨終始付海中之神寶劫盡乃亡大哉世尊慈悲莫並精求竭力等救沉淪伺機四十九年本懷未罄唱滅二月十五盡吐肝腸故得十外歸依闡提亦悟昆蟲草木悉已沾恩象馬蛇虺咸皆被澤內凡外凡而功超曠劫天類人類而果證無生能事既畢即告涅槃於是日月無光而山林變白大地震動而鳥獸哀鳴是凡是聖盡失所天情與無情誰非號慕是知此經一唱無復遺餘至矣盡矣他莫能尚舊經四十卷譯拙辭繁靈運削成言簡理直開宗判教五七八家灌頂精詳互存得失由是重參至理注此玄文惜乎陳隋兵亂疏未入經彼此分張勢同吳越況復藏中久匿學者鮮窺末世澆漓盡疲至道致使法眼垢佛日沉埋哀哉痛哉實傷心腑故豫不揣愚庸而輒敢效顰欲會此經而發心有日再三披閲宗趣粗知奈何旨奧文深有倣郭象錯綜前後多苦亡羊於是不懼闡提之罪甘負謗法之愆削繁録實貴在貫通罪歟福歟並伸懺悔時皇明萬曆歲次辛亥如來誕生日南本大般涅槃經五分圖品題總目初召請涅槃衆序品第一卷之一二開演涅槃施純陀品第二此品施常住五果對此土雜衆卷之二哀歎品第三此品施勝三修對此土聲聞衆長壽品第四此品訖大衆問品隨問而施對此土菩薩衆卷之三金剛身品第五名字功德品第六四相品第七卷四之五四依品第八卷之六邪正品第九卷之七四諦品第十四倒品第十一如來性品第十二卷之八文字品第十三鳥喻品第十四月喻品第十五卷之九菩薩品第十六大衆所問品第十七卷之十三示現涅槃行現病品第十八聖行品第十九卷十一之十三梵行品第二十此品末指雜華經明天行卷十四之十八嬰兒行品第二十一高貴德王品第二十二卷十九之二十四四問答涅槃義獅子吼品第二十三卷二十五之三十五折攝涅槃用迦葉菩薩品第二十四卷三十一之三十四憍陳如品第二十五卷三十五之三十六又四品半後時所至文分為二初折惡攝邪用陳如品末至遺教還源二品半二化周掩迹用茶毗品至廓潤品
